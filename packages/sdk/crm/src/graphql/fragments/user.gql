#import "./address.gql"
#import "./balances.gql"
fragment User on UserType {
  id
  email
  personalId
  customerType
  gender
  address {
    ...Address
  }
  balances {
    ...UserBalance
  }
  metaData
  availableChannels {
    channelId
    availableMarkets {
      id
      alias
      currency {
        code
      }
    }
  }
}
